<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERO Productivity</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="dark-theme">
    <div class="container" id="main-view">
        <header class="tracker-header">
            <h2 class="title">Time Tracker</h2>
            <div class="theme-toggle">
                <span>Dark Mode</span>
                <!-- Optional toggle switch can go here later if needed -->
            </div>
        </header>

        <section class="site-list-container">
            <ul id="siteList" class="site-list">
                <!-- Items will be populated by popup.js -->
            </ul>
        </section>

        <footer class="tracker-footer">
            <button id="dashboardBtn" class="action-btn btn-red">View Dashboard</button>
            <button id="clearDataBtn" class="action-btn btn-green">Clear Data</button>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>

</html>
